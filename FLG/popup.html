<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Fake Login Generator</h2>

<div class="topButtons">
<button id="phones">Display Phone Numbers</button>
<button id="fullLogin">Full Login</button>
</div>

<div class="grid">

<div class="section">
<input id="phoneInput" placeholder="Phone number">
<input id="msgCount" placeholder="Messages" type="number">
<button id="checkSMS">Get SMS</button>
</div>

<div class="section">
<input id="mailUser" placeholder="Mail user">
<button id="createMail">Create Mail</button>
</div>

<div class="section">
<input id="mailCheck" placeholder="Check mailbox">
<button id="checkMail">Check Mailbox</button>
</div>

<div class="section">
<input id="passLen" placeholder="Password length" type="number">
<button id="genPass">Generate Password</button>
</div>

</div>

<pre id="output"></pre>

<script src="popup.js"></script>
</body>
</html>
